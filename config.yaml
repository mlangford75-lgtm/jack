# ==============================================================================
#                      JACK RUNTIME CONFIGURATION TEMPLATE
# ==============================================================================
# This configuration file governs the deterministic Chassis safety gates and maps
# cognitive roles to your swappable local and cloud-delegated Engines.
#
# THE SOVEREIGN INVARIANT: Probabilistic cognition may propose, but 
# deterministic software must dispose.
#
# NOTE: Jack is local-first. It NEVER leaks your private data, local variables,
# or codebase files to external servers unless you explicitly configure a public
# cloud provider and authorize delegation.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. HOT CONTEXT BOUNDARY (Top 15 Feature #6: Periodic Context Defragmentation)
# ------------------------------------------------------------------------------
hot_context:
  # NOTE: The active context budget must be between 4096 and 128000 tokens.
  # If the conversational buffer or step execution stdout exceeds 75% of this capacity,
  # Jack's Chassis automatically freezes execution and commands the Librarian to run
  # a 50% high-density Context Defragmentation/Compaction pass to prevent OOMs.
  max_tokens: 48000

# ------------------------------------------------------------------------------
# 2. RETRIEVAL & SHADOW LEDGER (Top 15 Feature #5: XML Expanded Knowledge)
# ------------------------------------------------------------------------------
retrieval:
  project_id: jack_v05_beta
  chunk_size: 1000
  chunk_overlap: 100

# ------------------------------------------------------------------------------
# 3. LLM PROVIDERS & ENGINE REASONING CHANNELS
# ------------------------------------------------------------------------------
llm:
  default_provider: Local-Micro-Execution

  providers:
    # --- Local Macro-Planning Engine ---
    # Purpose: High-context planning, heavy reasoning, and JSON/XML generation.
    # Recommended: Gemma 4 26B or equivalent large local model.
    - name: Local-Macro-Planning
      kind: openai_compatible
      model: your-local-large-model-name
      base_url: http://127.0.0.1:1234/v1
      api_key: local
      timeout_seconds: 600.0
      max_retries: 2

    # --- Local Micro-Execution Engine ---
    # Purpose: Rapid code generation, tool usage, and fast tactical responses.
    # Recommended: Gemma 4 12B or equivalent fast local model.
    - name: Local-Micro-Execution
      kind: openai_compatible
      model: your-local-fast-model-name
      base_url: http://127.0.0.1:1234/v1
      api_key: local
      timeout_seconds: 600.0
      max_retries: 2

    # --- Powerful Adjudication Engine ---
    # Purpose: High-stakes auditing and Tri-Agent Synthesis (Master of Synthesis).
    # Recommended: Gemini or OpenAI equivalent.
    # SECURE POLICY: Never hard-code your private API keys in static files!
    # Declare the environment variable containing your key here (Dynamic Vault Isolation).
    - name: Powerful-Adjudicator
      kind: openai_compatible
      model: gemini-3.1-flash-lite
      base_url: https://generativelanguage.googleapis.com/v1beta/openai/
      api_key_env: GEMINI_API_KEY
      timeout_seconds: 600.0
      max_retries: 2

    # --- Local Embeddings ---
    # Purpose: Vectorizes documents for the Librarian Shadow Ledger.
    - name: Local-Embeddings
      kind: openai_compatible
      model: your-embedding-model-name
      base_url: http://127.0.0.1:1234/v1
      api_key: local
      timeout_seconds: 120.0

    # --- Local Reranker ---
    # Purpose: Re-ranks retrieved vector documents for context accuracy.
    - name: Local-Reranker
      kind: openai_compatible
      model: your-reranker-model-name
      reranker_model: your-reranker-model-name
      base_url: http://127.0.0.1:1338/v1  # e.g., Jan.ai or LM Studio port
      api_key: local
      timeout_seconds: 120.0

  # ----------------------------------------------------------------------------
  # 4. DEPARTMENTALIZED ROLE BINDINGS (Top 15 Feature #12: 7 Locked Pillars)
  # ----------------------------------------------------------------------------
  # Jack splits cognitive labor across isolated roles to prevent "role collapse"
  # (where a single model plans, writes, and reviews its own work).
  roles:
    # ========================================================================
    # THE SEVEN PILLARS OF DEPARTMENTALIZED COGNITION
    # ========================================================================

    # --- Pillar I: Manager (The Architect) ---
    # Mandate: Deconstructs user prompts and proposes formal, sandboxed JSON/XML execution plans.
    # Restriction: Has no direct tool access. Outputs must pass static ContractValidator.
    - role: manager
      provider: Local-Macro-Planning

    # --- Pillar II: Judge (The Master Auditor) ---
    # Mandate: Executes deterministic safety reviews, DLP audits, and memory reranking.
    # Restriction: Locked strictly to greedy decoding (temp 0.0) for absolute reproducibility.
    - role: judge
      provider: Powerful-Adjudicator

    # --- Pillar III: Muscle (The Synthesizer) ---
    # Mandate: Translates individual plan steps into actionable code, text, or terminal commands.
    # Restriction: All binary and text outputs are strictly quarantined (Ghost Ledger) before commit.
    - role: muscle
      provider: Local-Micro-Execution

    # --- Pillar IV: Eyes (Ingestion & Visual) ---
    # Mandate: Converts external images and documents into Markdown Proofs for safe context.
    # Restriction: Raw sources become cryptographically verified proofs, never raw context.
    - role: eyes
      provider: Local-Micro-Execution

    # --- Pillar V: Librarian (The Memory Dept) ---
    # Mandate: Retrieves context, executes memory, and manages proof defragmentation allowlists.
    # Restriction: Retrieval carries strict provenance and remains evidence, never authority.
    - role: librarian
      provider: Local-Macro-Planning

    # --- Pillar VI: Visual Studio (Governed Visual) ---
    # Mandate: Generates images under strict prompt sanitation and metadata stripping.
    # Restriction: Generation sits behind strict multimodal Data Loss Prevention (DLP).
    - role: visual_studio
      provider: Local-Macro-Planning

    # --- Pillar VII: Audio Studio (Governed Audio) ---
    # Mandate: Generates speech synthesis from sanitized transcripts.
    # Restriction: Output sits behind offline FFT spectral analysis and steganography gates (Ultrasonic Gate).
    - role: audio_studio
      provider: Local-Macro-Planning

    # ========================================================================
    # THE TRI-AGENT SYNTHESIS (TAS) PROTOCOL (Top 15 Feature #4)
    # ========================================================================

    # TAS Stage 1: Thesis
    # Role: The Architect proposing the initial solution with alternatives and failure modes.
    - role: tas_thesis
      provider: Local-Macro-Planning

    # TAS Stage 2: Antithesis
    # Role: The Sage of Friction exposing hidden assumptions and challenging boundary conditions.
    - role: tas_antithesis
      provider: Local-Micro-Execution

    # TAS Stage 3: Synthesis
    # Role: The Master of Synthesis acting as the ruthless tie-breaker using Sandbox evidence.
    - role: tas_synthesis
      provider: Powerful-Adjudicator

# ------------------------------------------------------------------------------
# 5. SOVEREIGN CHASSIS HARDENING & SAFETY GATES
# ------------------------------------------------------------------------------
# Top 15 Feature #15: Telemetry Kill Switch. When false, zero metadata is leaked.
telemetry_enabled: false

# Top 15 Feature #1: StreamingIRQ. Adjustable sliding window size for mid-token quarantine.
streaming_irq_window_size: 256

# Top 15 Feature #3: Zero-Network Math Sandbox. False = strict Docker isolation.
allow_local_subprocess_fallback: true

# Thinking Decoupling: Displays the internal cognitive trace inside visual terminal block.
show_thinking: true

# Top 15 Feature #4: TAS Proportional Scaling Ceilings
tas_thesis_max_tokens: 2048
tas_critique_max_tokens: 1000
tas_synthesis_max_tokens: 4096