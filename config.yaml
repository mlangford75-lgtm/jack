# ==============================================================================
#                      JACK RUNTIME CONFIGURATION TEMPLATE
# ==============================================================================
# This configuration file governs the deterministic Chassis safety gates and maps
# cognitive roles to your swappable local and cloud-delegated Engines.
#
# NOTE: Jack is local-first. It NEVER leaks your private data, local variables,
# or codebase files to external servers unless you explicitly configure a public
# cloud provider (like Gemini or OpenAI) and authorize delegation.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. HOT CONTEXT BOUNDARY (Active Memory Limits)
# ------------------------------------------------------------------------------
hot_context:
  # The active context budget in tokens (min: 4096, max: 128000).
  # If the conversational buffer or step execution stdout exceeds 75% of this capacity,
  # Jack's Chassis automatically freezes execution and commands the Librarian to run
  # a 50% high-density Context Defragmentation/Compaction pass.
  max_tokens: 48000

# ------------------------------------------------------------------------------
# 2. RETRIEVAL & SHADOW LEDGER POLICY (RAG and Chunking)
# ------------------------------------------------------------------------------
retrieval:
  # The tenant workspace identifier. Resolves to the local database at shadow_ledger/
  project_id: jack_v05_beta
  chunk_size: 1000
  chunk_overlap: 100

# ------------------------------------------------------------------------------
# 3. LLM PROVIDERS & ENGINE REASONING CHANNELS
# ------------------------------------------------------------------------------
llm:
  # The default provider to use if a role mapping is missing.
  default_provider: Gemma-4-26B

  # Configure your swappable probabilistic Engines below.
  # Jack is fully OpenAI-compatible. You can target LM Studio, Ollama, vLLM, or Cloud APIs.
  providers:
    # --- Local Macro-Planning Engine (Gemma-4-26B MoE equivalent) ---
    - name: Gemma-4-26B
      kind: openai_compatible
      model: google/gemma-4-26b-a4b-qat    # Swap this with your local model file name in LM Studio
      base_url: http://127.0.0.1:1234/v1   # Standard LM Studio local server endpoint
      api_key: local                       # Local mock key
      timeout_seconds: 600.0               # High timeout to prevent stream dropouts during heavy local computation
      max_retries: 2

    # --- Local Micro-Execution Engine (Gemma-4-12B equivalent) ---
    - name: Gemma-4-12B
      kind: openai_compatible
      model: google/gemma-4-12b-qat        # Swap this with your local model file name in LM Studio
      base_url: http://127.0.0.1:1234/v1
      api_key: local
      timeout_seconds: 600.0
      max_retries: 2

    # --- Cloud-Delegated Adjudication Engine (Gemini Flash) ---
    # Used strictly to prove how Jack can safely exploit cloud-scale reasoning 
    # without exposing local credentials, directories, or system files.
    - name: Gemini-Flash-Lite
      kind: openai_compatible
      model: gemini-3.1-flash-lite
      base_url: https://generativelanguage.googleapis.com/v1beta/openai/
      # SECURE POLICY: Never hard-code your private API keys in static files!
      # Declare the name of the environment variable containing your key here.
      # At runtime, Jack will inject it safely at the socket layer from RAM.
      api_key_env: GEMINI_API_KEY
      timeout_seconds: 600.0
      max_retries: 2

    # --- Long-Term Memory Vectorization & Embeddings ---
    - name: Librarian-Embed
      kind: openai_compatible
      model: text-embedding-embeddinggemma-300m
      base_url: http://127.0.0.1:1234/v1
      api_key: local
      timeout_seconds: 120.0

    # --- Neural Rerank Model for the Librarian ---
    - name: Librarian-Rerank
      kind: openai_compatible
      model: google/gemma-4-26b-a4b-qat
      reranker_model: mxbai-rerank-base-v2
      base_url: http://127.0.0.1:1234/v1
      api_key: local
      timeout_seconds: 120.0

  # ----------------------------------------------------------------------------
  # 4. DEPARTMENTALIZED ROLE BINDINGS (The 7 Pillars & TAS Loop)
  # ----------------------------------------------------------------------------
  # Jack splits cognitive labor across isolated roles to prevent "role collapse"
  # (where a single model plans, writes, and reviews its own work).
  roles:
    # --- Pillar I: Manager (The Planner / Architect) ---
    # Deconstructs user prompt and proposes a formal, sandboxed JSON/XML plan.
    - role: manager
      provider: Gemma-4-26B

    # --- Pillar III: Muscle (The Synthesizer / Executor) ---
    # Translates individual plan steps into code, text, or local actions.
    - role: muscle
      provider: Gemma-4-12B

    # --- Pillar II: Judge (The Master Auditor) ---
    # Performs deterministic pre-flight reviews and re-ranks memory.
    - role: judge
      provider: Gemini-Flash-Lite

    # --- Pillar VI: Visual Studio (Governed Visuals) ---
    # Generates images under strict prompt sanitation and visual DLP.
    - role: visual_studio
      provider: Gemma-4-26B

    # --- Pillar VII: Audio Studio (Governed Audio) ---
    # Generates speech synthesis from sanitized transcripts.
    - role: audio_studio
      provider: Gemma-4-26B

    # --- Pillar IV: Eyes (Ingestion & OCR) ---
    # Native multimodal model that transcribes local images and PDFs.
    - role: eyes
      provider: Gemma-4-12B

    # --------------------------------------------------------------------------
    # --- The Tri-Agent Synthesis (TAS) Friction Loop ---
    # Used for advanced adversarial reviews of high-risk plan trajectories.
    # --------------------------------------------------------------------------
    # TAS Stage 1: Thesis (Architect proposes the solution)
    - role: tas_thesis
      provider: Gemma-4-26B

    # TAS Stage 2: Antithesis (Sage of Friction exposes gaps and assumptions)
    - role: tas_antithesis
      provider: Gemma-4-12B

    # TAS Stage 3: Synthesis (Master of Synthesis tie-breaks and adjudicates)
    - role: tas_synthesis
      provider: Gemini-Flash-Lite

# ------------------------------------------------------------------------------
# 5. SOVEREIGN CHASSIS HARDENING & SAFETY GATES
# ------------------------------------------------------------------------------
# Telemetry Kill Switch: Set to false to run completely dark.
# When false, all errors are redacted, and zero metadata is leaked.
telemetry_enabled: false

# Streaming IRQ Window Size: The sliding window size in characters used to 
# quarantine outgoing token streams and catch exfiltration attempts mid-token.
# This size is fully adjustable based on your security tolerances (256 is default).
streaming_irq_window_size: 256

# Mathematical Sandbox Fallback: Allow Jack to safely execute Python/Z3S SMT
# code locally on the host's Python environment if the Docker engine is missing.
allow_local_subprocess_fallback: true

# Show Thinking: Displays the model's internal cognitive trace/reasoning
# process inside a separate visual terminal block.
show_thinking: true